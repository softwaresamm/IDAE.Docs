# Etiquetas de las notas de versión.
# Cada PRODUCTO corresponde a una épica de Jira. Etiqueta cada post con su
# producto (y opcionalmente "release"). Así los usuarios filtran las novedades
# por producto en /blog/tags/<permalink>.
#
# Puedes añadir la versión como etiqueta suelta en el post (p. ej. "v2.0.2");
# las etiquetas no listadas aquí solo generan un aviso en build, no lo rompen.

release:
  label: Release
  permalink: /release
  description: Notas de versión (lanzamientos).

